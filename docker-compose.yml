services:
  postgres:
    image: postgres:16-alpine
    container_name: event-management-postgres
    environment:
      POSTGRES_DB: event_management
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d event_management"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: .
      dockerfile: src/EventManagement.API/Dockerfile
    container_name: event-management-api
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ASPNETCORE_URLS: http://+:8080
      Database__MigrateOnStartup: "true"
      ConnectionStrings__DefaultConnection: Host=postgres;Port=5432;Database=event_management;Username=postgres;Password=postgres
    ports:
      - "5000:8080"
    depends_on:
      postgres:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
    container_name: event-management-frontend
    ports:
      - "5173:80"
    depends_on:
      - api

volumes:
  postgres-data:
